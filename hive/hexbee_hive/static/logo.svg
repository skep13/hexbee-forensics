<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- HexBee Forensics — geometric bee mark (SVG rendition of the project logo) -->
  <g stroke="#f0b429" fill="none" stroke-width="2">
    <!-- antennae -->
    <path d="M92 38 L80 16 M108 38 L120 16"/>
    <polygon points="76,10 84,10 88,16 84,22 76,22 72,16" fill="#f0b429" stroke="none"/>
    <polygon points="116,10 124,10 128,16 124,22 116,22 112,16" fill="#f0b429" stroke="none"/>
    <!-- wings: faceted polygons -->
    <g fill="#2b2416" fill-opacity="0.55">
      <polygon points="86,72 18,48 8,78 34,102 86,88"/>
      <polygon points="114,72 182,48 192,78 166,102 114,88"/>
    </g>
    <!-- wing facets + circuit traces -->
    <path d="M18 48 L48 76 L86 72 M8 78 L48 76 L34 102" stroke-width="1.2"/>
    <path d="M182 48 L152 76 L114 72 M192 78 L152 76 L166 102" stroke-width="1.2"/>
    <path d="M30 70 L44 82 L58 82 M44 82 L48 92" stroke-width="1.2"/>
    <circle cx="60" cy="82" r="2.2" stroke-width="1.2"/>
    <circle cx="50" cy="94" r="2.2" stroke-width="1.2"/>
    <path d="M170 70 L156 82 L142 82 M156 82 L152 92" stroke-width="1.2"/>
    <circle cx="140" cy="82" r="2.2" stroke-width="1.2"/>
    <circle cx="150" cy="94" r="2.2" stroke-width="1.2"/>
    <!-- head -->
    <polygon points="88,40 112,40 122,56 112,72 88,72 78,56" fill="#1f1a10"/>
    <!-- thorax with hex-core -->
    <polygon points="84,74 116,74 130,98 116,122 84,122 70,98" fill="#1f1a10"/>
    <polygon points="92,84 108,84 116,98 108,112 92,112 84,98" stroke-width="3"/>
    <polygon points="96,91 104,91 108,98 104,105 96,105 92,98" fill="#f0b429" stroke="none"/>
  </g>
  <!-- abdomen: striped chevrons tapering to stinger -->
  <g stroke="none">
    <polygon points="78,124 122,124 118,136 82,136" fill="#f0b429"/>
    <polygon points="82,138 118,138 114,150 86,150" fill="#1f1a10"/>
    <polygon points="86,152 114,152 110,164 90,164" fill="#f0b429"/>
    <polygon points="90,166 110,166 106,178 94,178" fill="#1f1a10"/>
    <polygon points="94,180 106,180 100,200" fill="#f0b429"/>
  </g>
  <g stroke="#f0b429" stroke-width="1.5" fill="none">
    <polygon points="78,124 122,124 100,200"/>
  </g>
</svg>
